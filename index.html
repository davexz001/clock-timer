<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="timer">
    <div class="flip-digit" id="minutes-tens">
      <div class="top">0</div>
      <div class="bottom">0</div>
    </div>
    <div class="flip-digit" id="minutes-ones">
      <div class="top">0</div>
      <div class="bottom">0</div>
    </div>
    <span class="separator">:</span>
    <div class="flip-digit" id="seconds-tens">
      <div class="top">0</div>
      <div class="bottom">0</div>
    </div>
    <div class="flip-digit" id="seconds-ones">
      <div class="top">0</div>
      <div class="bottom">0</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
